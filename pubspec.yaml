name: cts_underground_mining_assessment
description: Offline-first Android tablet inspection workflow for Combined Technical Services.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  archive: ^4.0.9
  collection: ^1.19.1
  cross_file: ^0.3.4+2
  file_picker: ^11.0.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  image: ^4.8.0
  image_picker: ^1.2.1
  integration_test:
    sdk: flutter
  intl: ^0.20.2
  meta: ^1.17.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.2
  signature: ^6.3.0
  sqflite: ^2.4.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.6

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/demo/
  fonts:
    - family: PublicSans
      fonts:
        - asset: assets/fonts/PublicSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PublicSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PublicSans-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
