name: Flutter quality and APKs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test test_driver

      - name: Analyze
        run: flutter analyze

      - name: Run full test suite with coverage
        run: flutter test --coverage

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android integration matrix
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: >-
            -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -memory 2048
            -no-boot-anim -camera-back none
          script: |
            flutter drive --no-dds --no-pub --dart-define=INTEGRATION_TEST_SHOULD_REPORT_RESULTS_TO_NATIVE=false --driver=test_driver/integration_test.dart --target=integration_test/app_flow_test.dart -d emulator-5554
            flutter drive --no-dds --no-pub --dart-define=INTEGRATION_TEST_SHOULD_REPORT_RESULTS_TO_NATIVE=false --driver=test_driver/integration_test.dart --target=integration_test/app_matrix_test.dart -d emulator-5554

      - name: Reset build products before production APK
        run: |
          flutter clean
          flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Run Android release lint
        run: ./android/gradlew -p android lintRelease

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: underground-mining-coverage
          path: coverage/lcov.info
          if-no-files-found: error

      - name: Upload installable APKs
        uses: actions/upload-artifact@v4
        with:
          name: underground-mining-apks
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
